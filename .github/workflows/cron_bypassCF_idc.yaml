name: readLike IDC（自动阅读随机点赞）
#只是固定了WEBSITE变量为idcflare.com

# GitHub.secrets优先级最高，即使没有设置对应的变量，它也会读取，这时变量为空值，导致报错，.env读取的变量无法覆盖这个值,使用了${PASSWORD_ESCAPED//\#/\\#}来对#转义,需要两个\，但是我直接在env文件使用这种方法是不行的，GitHub action是有效
on:
  schedule:
    # UTC 15:30 = 北京时间 23:30；update-cron.yml 会每天改成 23:00-次日 04:59 内的随机时间
    - cron: '39 17 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45 # 脚本随机运行 18-30 分钟，预留依赖安装和浏览器启动时间

    strategy:
      matrix:
        node-version: [20.x]
    env:
      # 在作业级别设置环境变量      
      USERNAMES: ${{ secrets.IDC_USERNAMES || secrets.USERNAMES }}
      PASSWORDS: ${{ secrets.IDC_PASSWORDS || secrets.PASSWORDS }}
      COOKIES: ${{ secrets.IDC_COOKIES || secrets.COOKIES }}
      WEBSITE: "https://idcflare.com"
      RUN_TIME_LIMIT_MINUTES: ${{ secrets.RUN_TIME_LIMIT_MINUTES }}
      RANDOM_RUN_TIME_ENABLED: "true"
      RUN_TIME_RANDOM_MINUTES_MIN: "18"
      RUN_TIME_RANDOM_MINUTES_MAX: "30"
      MAX_CONCURRENT_ACCOUNTS: ${{ secrets.IDC_MAX_CONCURRENT_ACCOUNTS || secrets.MAX_CONCURRENT_ACCOUNTS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
      SPECIFIC_USER: ${{ secrets.SPECIFIC_USER }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      LIKE_SPECIFIC_USER: "false"
      AUTO_LIKE: "true"
      AUTO_LIKE_WEEKLY_LIMIT: "10"
      ENABLE_RSS_FETCH: ${{ secrets.ENABLE_RSS_FETCH || '' }}
      ENABLE_TOPIC_DATA_FETCH: ${{ secrets.ENABLE_TOPIC_DATA_FETCH || '' }}
      HEALTH_PORT: ${{ secrets.HEALTH_PORT }}
      # 代理配置
      PROXY_URL: ${{ secrets.PROXY_URL }}
      PROXY_TYPE: ${{ secrets.PROXY_TYPE }}
      PROXY_HOST: ${{ secrets.PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      # 数据库配置
      POSTGRES_URI: ${{ secrets.POSTGRES_URI }}
      COCKROACH_URI: ${{ secrets.COCKROACH_URI }}
      NEON_URI: ${{ secrets.NEON_URI }}
      AIVEN_MYSQL_URI: ${{ secrets.AIVEN_MYSQL_URI }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
    steps:
      - uses: actions/checkout@v3 # 检出仓库

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: |
          npm install

      - name: Run a script
        run: node bypasscf.js
