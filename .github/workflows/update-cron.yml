name: Update Workflow Cron

on:
  schedule:
    # UTC 12:00 = 北京时间 20:00，在阅读窗口开始前刷新当天随机运行时间
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动触发
#   push:
#     branches:
#       - main
env:
  PAT_TOKEN: ${{ secrets.PAT_TOKEN }} # Workflows Update GitHub Action workflow files. Learn more.  read and write access to the repository contents.  classic s
permissions:
  contents: write  
  actions: write

jobs:
  update-cron:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.PAT_TOKEN }}

      - name: generate random time
        id: random
        shell: bash
        run: |
          generate_cron() {
            local prefix="$1"
            local label="$2"
            local offset=$((RANDOM % 360))
            local bjt_total=$((23 * 60 + offset))
            local bjt_day_total=$((bjt_total % 1440))
            local bjt_hour=$((bjt_day_total / 60))
            local min=$((bjt_day_total % 60))
            local utc_total=$(((bjt_total - 8 * 60 + 1440) % 1440))
            local utc_hour=$((utc_total / 60))
            local cron="$min $utc_hour * * *"

            printf '%s_cron=%s\n' "$prefix" "$cron" >> "$GITHUB_OUTPUT"
            printf '%s_bjt_time=%02d:%02d\n' "$prefix" "$bjt_hour" "$min" >> "$GITHUB_OUTPUT"
            printf '%s_utc_time=%02d:%02d\n' "$prefix" "$utc_hour" "$min" >> "$GITHUB_OUTPUT"
            printf '%s 北京时间 %02d:%02d, UTC 时间 %02d:%02d\n' "$label" "$bjt_hour" "$min" "$utc_hour" "$min"
          }

          generate_cron linux "linux.do"
          generate_cron idc "idcflare"

      - name: replace cron expression
        shell: bash
        run: |
          sed -i -E "s#^[[:space:]]+- cron: ['\"][^'\"]*['\"]#    - cron: '${{ steps.random.outputs.linux_cron }}'#" .github/workflows/cron_bypassCF.yaml
          sed -i -E "s#^[[:space:]]+- cron: ['\"][^'\"]*['\"]#    - cron: '${{ steps.random.outputs.idc_cron }}'#" .github/workflows/cron_bypassCF_idc.yaml

      - name: commit and push changes
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cron_bypassCF.yaml .github/workflows/cron_bypassCF_idc.yaml
          if git diff --cached --quiet; then
            echo "Cron expression unchanged."
            exit 0
          fi
          git commit -m "update readLike cron times"
          git push "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.event.repository.default_branch }}

       
